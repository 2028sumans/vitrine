<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#FAFAF5"/>
  <g stroke="#2A3316" fill="none" stroke-linecap="butt">
    <!-- Main M strokes: left stem up, diagonal down to center V, diagonal up to right stem, right stem down -->
    <path d="M 4.5 26 L 4.5 6.5 L 16 22 L 27.5 6.5 L 27.5 26"
          stroke-width="2.2"
          stroke-linejoin="miter"
          stroke-miterlimit="3"/>
    <!-- Top apex serifs -->
    <path d="M 2 6.5 H 7" stroke-width="1.2"/>
    <path d="M 25 6.5 H 30" stroke-width="1.2"/>
    <!-- Base serifs -->
    <path d="M 1.5 26 H 7.5" stroke-width="1.2"/>
    <path d="M 24.5 26 H 30.5" stroke-width="1.2"/>
  </g>
</svg>
